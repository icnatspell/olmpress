name: 'Set up chisel'
description: 'Install uv, optionally sync the project, and prepare Python.'
inputs:
  sync:
    description: 'Whether to run uv sync (set to "false" for jobs that only need uvx).'
    required: false
    default: 'true'
runs:
  using: composite
  steps:
    - uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true
    - if: inputs.sync == 'true'
      shell: bash
      run: |
        uv python install
        uv sync
