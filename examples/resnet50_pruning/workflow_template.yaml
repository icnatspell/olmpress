# Structured pruning workflow template for microsoft/resnet-50.
# Instantiated by run_sweep.sh via envsubst — do not run directly.
#
# Required env vars:
#   IMPORTANCE          pruning importance criterion (e.g. magnitude, lamp)
#   RATIO               pruning_ratio float (e.g. 0.05)
#   GLOBAL_PRUNING      true | false
#   CALIBRATION_STEPS   gradient-based calibration steps (e.g. 10)
#   OUTPUT_DIR          path for the pruned TorchScript model

input_model:
  type: PyTorchModel
  model_script: examples/resnet50_pruning/resnet50_model.py
  model_loader: load_model
  dummy_inputs_func: get_dummy_inputs

systems:
  local_system:
    type: LocalSystem
    accelerators:
      - execution_providers:
          - CUDAExecutionProvider

passes:
  pruning:
    type: TorchPruningPass
    config:
      pruning_ratio: ${RATIO}
      importance: ${IMPORTANCE}
      global_pruning: ${GLOBAL_PRUNING}
      calibration_steps: ${CALIBRATION_STEPS}
      round_to: 8

engine:
  host: local_system
  target: local_system
  cache_dir: cache
  clean_cache: false
  output_dir: ${OUTPUT_DIR}
  log_severity_level: 1
