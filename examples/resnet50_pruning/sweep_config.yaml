# Evaluation sweep configuration for ResNet-50 structured pruning.
# Used by run_sweep.py.

model:
  weights: IMAGENET1K_V1      # torchvision ResNet-50 weights
  ignored_layers: [fc]         # always preserve the 1000-class head
  round_to: 8                  # align pruned channels to multiples of 8
  global_pruning: true         # distribute sparsity globally across all layers

evaluation:
  dataset: zh-plus/tiny-imagenet  # 200 ImageNet classes, no auth required
  split: valid
  num_samples: 2000               # 10 images per class (200 classes × 50 val images each)
  batch_size: 64

# Sparsity levels to sweep across all importance criteria.
pruning_ratios: [0.05, 0.10, 0.15, 0.20, 0.25, 0.30]

# Each entry defines one importance criterion.
# Gradient-based criteria (taylor, hessian) run extra backward passes before
# each pruning step; calibration_steps controls how many.
importances:
  - name: magnitude
  - name: group_magnitude
  - name: lamp
  - name: fpgm
  - name: taylor
    calibration_steps: 10
  - name: hessian
    calibration_steps: 10
