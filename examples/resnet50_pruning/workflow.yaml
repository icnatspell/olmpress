# Structured pruning via olmpress + Olive.
#
# Run from the project root:
#   uv run olmpress run --config examples/resnet50_pruning/workflow.yaml
#
# Switch between HfModel and PyTorchModel by uncommenting the relevant block.

# --- Option A: HuggingFace model (LLM) ---
input_model:
  type: HfModel
  model_path: microsoft/resnet-50
  task: image-classification

# --- Option B: PyTorchModel (ResNet-50) ---
# input_model:
#   type: PyTorchModel
#   model_script: examples/resnet50_pruning/resnet50_model.py
#   model_loader: load_model
#   dummy_inputs_func: get_dummy_inputs

systems:
  local_system:
    type: LocalSystem
    accelerators:
      - execution_providers:
          - CPUExecutionProvider

passes:
  pruning:
    type: TorchPruningPass
    config:
      pruning_ratio: 0.10
      importance: magnitude
      global_pruning: false
      calibration_steps: 10
      round_to: 8
      ignored_layers: ["classifier.1"]

engine:
  host: local_system
  target: local_system
  cache_dir: cache
  clean_cache: false
  output_dir: workflows/smollm2-pruning/outputs/magnitude_0.10
  log_severity_level: 1
