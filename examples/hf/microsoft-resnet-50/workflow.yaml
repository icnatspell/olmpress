# Structured pruning via olmpress + Olive — HfModel path.
#
# Run from the project root:
#   uv run olmpress run --config examples/hf/microsoft-resnet-50/workflow.yaml

input_model:
  type: HfModel
  model_path: microsoft/resnet-50
  task: image-classification

systems:
  local_system:
    type: LocalSystem
    accelerators:
      - execution_providers:
          - CPUExecutionProvider

passes:
  pruning:
    type: TorchPruningPass
    config:
      pruning_ratio: 0.10
      importance: lamp
      global_pruning: true
      ignored_layers:
        - classifier.1

engine:
  host: local_system
  target: local_system
  cache_dir: cache
  clean_cache: true
  output_dir: examples/hf/microsoft-resnet-50/outputs/lamp_0.10
  log_severity_level: 1
