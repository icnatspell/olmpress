# Structured pruning followed by fine-tuning recovery — HfModel path.
# Evaluation (acc@1) runs automatically on the final model via Olive's evaluator.
#
# Run from the project root:
#   uv run chisel run --config examples/hf/microsoft-resnet-50/workflow.yaml

input_model:
  type: HfModel
  model_path: microsoft/resnet-50
  task: image-classification

systems:
  local_system:
    type: LocalSystem
    accelerators:
      - execution_providers:
          - CUDAExecutionProvider

data_configs:
  - name: imagenet_val
    user_script: examples/hf/microsoft-resnet-50/eval_data_script.py
    load_dataset_config:
      type: imagenet_val_dataset
      params:
        num_samples: 200
    post_process_data_config:
      type: imagenet_post_process
    dataloader_config:
      params:
        batch_size: 64

evaluators:
  common_evaluator:
    metrics:
      - name: accuracy
        type: accuracy
        data_config: imagenet_val
        sub_types:
          - name: accuracy_score
            priority: 1
            metric_config:
              task: multiclass
              num_classes: 1000

passes:
  pruning:
    type: TorchPruningPass
    config:
      pruning_ratio: 0.10
      importance: lamp
      global_pruning: true
      ignored_layers:
        - classifier.1

  finetuning:
    type: FineTunePass
    config:
      user_script: examples/hf/microsoft-resnet-50/finetune_script.py
      finetune_fn: finetune
      finetune_config:
        train_samples: 5000
        epochs: 5
        batch_size: 32
        lr: 0.001
        teacher_model: IMAGENET1K_V2
        temperature: 4.0
        alpha: 0.5

engine:
  host: local_system
  target: local_system
  evaluator: common_evaluator
  evaluate_input_model: false
  cache_dir: cache
  clean_cache: true
  output_dir: examples/hf/microsoft-resnet-50/outputs/lamp_0.10_kd
  log_severity_level: 1
