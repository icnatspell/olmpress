# Structured pruning via olmpress + Olive — PyTorchModel path.
#
# Run from the project root:
#   uv run olmpress run --config examples/microsoft--resnet-50/pytorch/workflow.yaml

input_model:
  type: PyTorchModel
  model_script: examples/microsoft--resnet-50/pytorch/load_model.py
  model_loader: load_model
  dummy_inputs_func: get_dummy_inputs

systems:
  local_system:
    type: LocalSystem
    accelerators:
      - execution_providers:
          - CPUExecutionProvider

passes:
  pruning:
    type: TorchPruningPass
    config:
      pruning_ratio: 0.10
      importance: lamp
      global_pruning: true
      ignored_layers: []

engine:
  host: local_system
  target: local_system
  cache_dir: cache
  clean_cache: true
  output_dir: examples/microsoft--resnet-50/pytorch/outputs/lamp_0.10
  log_severity_level: 1
